{% extends "base.html" %}
{% block title %}Capture{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Capture Trace</h2>
</div>

<div class="grid-2">
    <div class="card">
        <h3>Device</h3>
        <div id="device-panel" hx-get="/api/devices" hx-trigger="load, every 5s" hx-swap="innerHTML">
            <p class="muted">Checking...</p>
        </div>
    </div>

    <div class="card">
        <h3>Capture Settings</h3>
        <form id="capture-form" hx-post="/api/capture/start" hx-target="#capture-status" hx-swap="innerHTML">
            <div class="form-group">
                <label>Type</label>
                <select name="type">
                    <option value="trace">Performance Trace</option>
                    <option value="memory">Memory + Heap Dump</option>
                </select>
            </div>
            <div class="form-group">
                <label>Duration (seconds)</label>
                <input type="number" name="duration_s" value="10" min="1" max="300">
            </div>
            <div class="form-group">
                <label>Package (optional)</label>
                <input type="text" name="package" placeholder="com.example.app">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" name="launch_app" value="true">
                    Cold-launch app (force stop + start)
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Start Capture</button>
        </form>
    </div>
</div>

<div class="card" id="capture-status">
    <p class="muted">Ready to capture. Connect a device and configure settings above.</p>
</div>
{% endblock %}
